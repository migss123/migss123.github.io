
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha de RPG - Sobrevivente</title>
    <style>
        :root {
            --bg-body: #e5e5e5;
            --bg-ficha: #ffffff;
            --text-color: #1a1a1a;
            --primary-border: #333;
            --secondary-bg: #f0f0f0;
            --input-border: #ccc;
            --table-header: #1a1a1a;
            --table-text: #ffffff;
            --shadow: rgba(0,0,0,0.2);
            --icon-filter: invert(0);
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --bg-ficha: #1e1e1e;
            --text-color: #e0e0e0;
            --primary-border: #555;
            --secondary-bg: #2d2d2d;
            --input-border: #444;
            --table-header: #333;
            --table-text: #e0e0e0;
            --shadow: rgba(0,0,0,0.5);
            --icon-filter: invert(1);
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-body);
            padding: 20px;
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }

        .ficha-container {
            max-width: 850px;
            margin: 0 auto;
            background: var(--bg-ficha);
            padding: 40px;
            border: 3px solid var(--primary-border);
            box-shadow: 15px 15px 0px var(--shadow);
            position: relative;
        }

        /* Botão de Alternância de Tema com Ícones */
        .theme-toggle {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: 2px solid var(--primary-border);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
            padding: 0;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        .theme-toggle img {
            width: 24px;
            height: 24px;
            filter: var(--icon-filter);
        }

        header {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 20px;
            border-bottom: 4px double var(--primary-border);
            padding-bottom: 20px;
            margin-bottom: 30px;
            margin-top: 20px;
        }

        .field { display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 5px; }
        
        input[type="text"], input[type="number"], textarea {
            border: none;
            border-bottom: 1.5px solid var(--primary-border);
            padding: 5px;
            font-size: 1.1rem;
            outline: none;
            background: transparent;
            color: var(--text-color);
        }

        /* Atributos Hexagonais */
        .attributes-section {
            display: flex;
            justify-content: center;
            margin: 40px 0;
        }

        .attributes-grid {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .attr-box {
            border: 3px solid var(--primary-border);
            width: 85px;
            height: 95px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--secondary-bg);
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
        }

        .attr-box label { margin: 0; font-size: 0.9rem; }
        .attr-box input {
            width: 45px;
            text-align: center;
            font-size: 1.8rem;
            font-weight: bold;
            border: none;
        }

        /* Status */
        .status-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .status-item {
            border: 2px solid var(--primary-border);
            padding: 10px;
            text-align: center;
            background: var(--bg-ficha);
        }

        .status-item input { width: 45px; font-size: 1.2rem; text-align: center; border-bottom: 1px solid var(--input-border); }

        /* Tabelas */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: var(--table-header); color: var(--table-text); padding: 10px; font-size: 0.8rem; text-transform: uppercase; }
        td { border: 1px solid var(--input-border); padding: 8px; text-align: center; }

        .flex-row { display: flex; gap: 30px; }
        .column { flex: 1; }

        .btn-print {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            background: var(--primary-border);
            color: var(--bg-ficha);
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @media print { 
            .btn-print, .theme-toggle { display: none; } 
            body { background: white; padding: 0; } 
            .ficha-container { box-shadow: none; border: 2px solid #000; background: white; color: black; }
            .attr-box { background: #eee; border: 2px solid #000; }
            th { background: #000; color: #fff; }
        }
    </style>
</head>

    themeToggle.addEventListener('click', () => {
        const currentTheme = document.body.getAttribute('data-theme');
        if (currentTheme === 'light') {
            document.body.setAttribute('data-theme', 'dark');
            themeIcon.src = sunIcon;
            themeIcon.alt = "Modo Claro";
        } else {
            document.body.setAttribute('data-theme', 'light');
            themeIcon.src = moonIcon;
            themeIcon.alt = "Modo Escuro";
        }
    });

    const pericias = [
        "Acrobacia (DEX)", "Adestramento (CAR)", "Artes (CAR)", "Atletismo (FOR)", 
        "Crime (DEX)", "Culinária (INT)", "Cura (INT)", "Diplomacia (CAR)", 
        "Duelo (FOR)", "Fortitude (VIG)", "Furtividade (DEX)", "História (INT)",
        "Iniciativa (DEX)", "Intimidação (CAR)", "Intuição (CAR)", "Investigação (INT)",
        "Medicina (INT)", "Persuasão (CAR)", "Pontaria (DEX)", "Reflexos (DEX)",
        "Sobrevivência (INT)", "Tática (INT)", "Tecnologia (INT)", "Vontade (CAR)"
    ];

    const skillList = document.getElementById('skillList');
    pericias.forEach(s => {
        skillList.innerHTML += `<tr><td style="text-align:left; font-size:0.75rem; font-weight: bold;">${s}</td><td><input type="number" style="width:35px; border:none; border-bottom: 1px solid var(--input-border);"></td><td><input type="number" style="width:35px; border:none; border-bottom: 1px solid var(--input-border);"></td></tr>`;
    });

    const inventoryList = document.getElementById('inventoryList');
    for(let i=0; i<8; i++) {
        inventoryList.innerHTML += `<tr><td><input type="text" style="width:95%; border:none; border-bottom: 1px solid var(--input-border);"></td><td><input type="text" style="width:90%; border:none; border-bottom: 1px solid var(--input-border);"></td></tr>`;
    }
</script>
